# Start AeroSpace at login
start-at-login = true

# Run Sketchybar together with AeroSpace
# sketchbar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
# after-startup-command = ['exec-and-forget sketchybar']

# Notify Sketchybar about workspace change
# exec-on-workspace-change = [
#   '/bin/bash',
#   '-c',
#   'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
# ]

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 20

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-cmd-ctrl-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodness#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# A - AI
[[on-window-detected]]
if.app-name-regex-substring = 'Claude'
run = 'move-node-to-workspace A'

# B - Browser
[[on-window-detected]]
if.app-name-regex-substring = 'Arc'
run = 'move-node-to-workspace B'

# C - Code
[[on-window-detected]]
if.app-name-regex-substring = 'cmux'
run = 'move-node-to-workspace C'

# D - Database
[[on-window-detected]]
if.app-name-regex-substring = 'DataGrip'
run = 'move-node-to-workspace D'

# M - Message
[[on-window-detected]]
if.app-name-regex-substring = 'Slack'
run = 'move-node-to-workspace M'

# N - Notes
[[on-window-detected]]
if.app-name-regex-substring = 'Notion'
run = 'move-node-to-workspace N'

# V - Virtualization (OrbStack)
[[on-window-detected]]
if.app-name-regex-substring = 'OrbStack'
run = 'move-node-to-workspace V'

# S - System
[[on-window-detected]]
if.app-name-regex-substring = 'System Settings'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-name-regex-substring = 'Terminal'
run = ['layout floating', 'move-node-to-workspace S']

[[on-window-detected]]
if.app-name-regex-substring = 'Finder'
run = ['layout floating', 'move-node-to-workspace S']

# Spotify stays floating, no workspace assignment
[[on-window-detected]]
if.app-name-regex-substring = 'Spotify'
run = 'layout floating'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 5
outer.right = 10

[workspace-to-monitor-force-assignment]
0 = 'secondary'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with cmd-ctrl + enter shortcut (like in i3)
# cmd-ctrl-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

cmd-ctrl-shift-f = 'fullscreen'
cmd-ctrl-f = 'layout floating tiling'

cmd-ctrl-shift-left = 'move left'
cmd-ctrl-shift-down = 'move down'
cmd-ctrl-shift-up = 'move up'
cmd-ctrl-shift-right = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
cmd-ctrl-slash = 'layout tiles horizontal vertical'
cmd-ctrl-comma = 'layout accordion horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
cmd-ctrl-h = 'focus left'
cmd-ctrl-j = 'focus down'
cmd-ctrl-k = 'focus up'
cmd-ctrl-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
cmd-ctrl-shift-minus = 'resize smart -50'
cmd-ctrl-shift-equal = 'resize smart +50'

# Workspace switching
# 1-3: general purpose
# A: AI (Claude)
# B: Browser (Arc)
# C: Code (cmux)
# D: Database (DataGrip)
# M: Message (Slack)
# N: Notes (Notion)
# V: Virtualization (OrbStack)
# S: System (Settings, Terminal, Finder)
cmd-ctrl-0 = 'workspace 0'
cmd-ctrl-1 = 'workspace 1'
cmd-ctrl-2 = 'workspace 2'
cmd-ctrl-3 = 'workspace 3'
cmd-ctrl-a = 'workspace A'
cmd-ctrl-b = 'workspace B'
cmd-ctrl-c = 'workspace C'
cmd-ctrl-d = 'workspace D'
cmd-ctrl-m = 'workspace M'
cmd-ctrl-n = 'workspace N'
cmd-ctrl-v = 'workspace V'
cmd-ctrl-s = 'workspace S'

# Move window to workspace
cmd-ctrl-shift-0 = 'move-node-to-workspace 0 --focus-follows-window'
cmd-ctrl-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
cmd-ctrl-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
cmd-ctrl-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
cmd-ctrl-shift-a = 'move-node-to-workspace A --focus-follows-window'
cmd-ctrl-shift-b = 'move-node-to-workspace B --focus-follows-window'
cmd-ctrl-shift-c = 'move-node-to-workspace C --focus-follows-window'
cmd-ctrl-shift-d = 'move-node-to-workspace D --focus-follows-window'
cmd-ctrl-shift-m = 'move-node-to-workspace M --focus-follows-window'
cmd-ctrl-shift-n = 'move-node-to-workspace N --focus-follows-window'
cmd-ctrl-shift-v = 'move-node-to-workspace V --focus-follows-window'
cmd-ctrl-shift-s = 'move-node-to-workspace S --focus-follows-window'

cmd-ctrl-tab = 'workspace-back-and-forth'
cmd-ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
cmd-ctrl-shift-semicolon = 'mode service'

# cmd-ctrl-f = "macos-native-fullscreen"
# cmd-ctrl-m = "macos-native-minimize"

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

cmd-ctrl-shift-h = ['join-with left', 'mode main']
cmd-ctrl-shift-j = ['join-with down', 'mode main']
cmd-ctrl-shift-k = ['join-with up', 'mode main']
cmd-ctrl-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']
